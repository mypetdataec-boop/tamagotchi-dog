<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NeoPixel Pet: Ultimate Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #00f2ff;
    --text: #f1f5f9; --border: #1e293b; --xp: #8b5cf6; --danger: #f43f5e;
  }
  * { box-sizing: border-box; user-select: none; }
  body {
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg);
    color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  #app { width: 1000px; max-width: 95%; display: grid; gap: 20px; grid-template-columns: 450px 1fr; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
  
  canvas { width: 100%; height: 350px; background: #000; border-radius: 16px; border: 4px solid #334155; image-rendering: pixelated; }
  
  .stat-bar { background: #0f172a; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
  .fill { height: 100%; transition: width 0.3s ease; }
  
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    background: #1e293b; color: white; border: none; padding: 12px; border-radius: 12px;
    font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 13px;
  }
  button:hover:not(:disabled) { background: #334155; transform: translateY(-2px); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.action { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
  
  #gameContainer {
    height: 250px; background: rgba(0,0,0,0.4); border-radius: 16px; border: 2px dashed #334155;
    display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;
  }

  .game-obj { position: absolute; font-size: 30px; cursor: pointer; animation: fall 1.5s linear forwards; }
  @keyframes fall { from { transform: translateY(-50px); } to { transform: translateY(260px); } }

  #sleepOverlay {
    position: absolute; inset: 0; background: rgba(0,10,50,0.9); border-radius: 16px;
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }

  #modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div id="modal">
  <div class="card" style="width: 350px; text-align: center;">
    <h2 style="font-family:'Press Start 2P'; font-size:12px; color:var(--accent)">ADOPCIÓN</h2>
    <input id="petName" type="text" placeholder="Nombre del perro" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; background:#0f172a; color:white; border:1px solid #334155;">
    <select id="petBreed" style="width:100%; padding:10px; border-radius:8px; margin-bottom:15px; background:#0f172a; color:white;">
      <option value="husky">Husky Siberiano</option>
      <option value="yorkie">Yorkshire Terrier</option>
      <option value="poodle">Poodle Elegante</option>
      <option value="bulldog">Bulldog Fuerte</option>
      <option value="labrador">Labrador Dorado</option>
    </select>
    <button onclick="startApp()" class="action" style="width:100%">COMENZAR JUEGO</button>
  </div>
</div>

<div id="app">
  <div class="card">
    <div id="sleepOverlay">
      <h1 style="font-family:'Press Start 2P'; color:white;">Zzz...</h1>
      <p id="sleepTimer" style="color:var(--accent); font-weight:bold;">10s</p>
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <span id="lvTxt" style="background:var(--xp); padding:4px 8px; border-radius:6px; font-size:10px; font-family:'Press Start 2P'">LV 1</span>
      <span id="nameDisplay" style="font-weight:900; color:var(--accent)">DOGGO</span>
    </div>
    <canvas id="petCanvas" width="160" height="160"></canvas>
    <p style="font-size:10px; margin: 10px 0 5px;">XP EXPERIENCIA</p>
    <div class="stat-bar"><div id="xpFill" class="fill" style="background:var(--xp); width:0%"></div></div>
    
    <div class="btn-grid">
      <button onclick="petAction('feed')" class="action">🍖 Alimentar</button>
      <button onclick="petAction('play')" class="action">🎾 Jugar</button>
      <button onclick="petAction('sleep')" style="background:#f59e0b">😴 Dormir</button>
      <button onclick="petAction('clean')" style="background:#10b981">🧼 Limpiar</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 15px 0">Panel de Control</h3>
    <div class="stat-bar"><div id="energyFill" class="fill" style="background:#38bdf8; width:100%"></div></div>
    <div class="stat-bar"><div id="hungerFill" class="fill" style="background:#fb7185; width:100%"></div></div>
    <div id="gameContainer">
      <p id="mgHint" style="color:var(--muted); text-align:center; padding:20px;">
        Selecciona un juego para ganar XP:<br><br>
        <button onclick="launchGame('catch')" style="font-size:10px;">ATRAPAR</button>
        <button onclick="launchGame('click')" style="font-size:10px;">CLICKER</button>
        <button onclick="launchGame('timing')" style="font-size:10px;">PRESIÓN</button>
      </p>
    </div>
  </div>
</div>

<script>
const state = {
  name: 'Doggo', breed: 'husky',
  hunger: 100, energy: 100, xp: 0, lv: 1,
  anim: 'idle', tick: 0, frame: 0,
  busy: false
};

const canvas = document.getElementById('petCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawPet() {
  ctx.clearRect(0, 0, 160, 160);
  ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 120, 160, 40); // Suelo

  const bx = 60, by = 80; // Base Position
  let bounce = Math.sin(state.tick * 0.1) * 2;
  let headTilt = 0;
  let isBlinking = state.frame === 1 || state.anim === 'sleep';

  if (state.anim === 'play') bounce = -Math.abs(Math.sin(state.tick * 0.2) * 30);
  if (state.anim === 'feed') headTilt = (state.tick % 20 < 10) ? 10 : 0;

  ctx.save();
  ctx.translate(bx, by + bounce);

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(20, 45, 25, 6, 0, 0, Math.PI*2); ctx.fill();

  // CUERPO SEGÚN RAZA
  const colors = {
    husky: ['#64748b', '#f8fafc'], yorkie: ['#78350f', '#fbbf24'],
    poodle: ['#fdf4ff', '#f0abfc'], bulldog: ['#a67c52', '#451a03'],
    labrador: ['#fbbf24', '#fef08a']
  };
  const c = colors[state.breed];

  // Cuerpo y Cola
  ctx.fillStyle = c[0];
  ctx.fillRect(0, 10, 45, 30); // Torso
  ctx.fillRect(40, 5, 8, 15);  // Cola

  // Patas
  ctx.fillRect(5, 35, 8, 12); ctx.fillRect(32, 35, 8, 12);

  // CABEZA (A la izquierda para que coma de frente)
  ctx.save();
  ctx.translate(5, 15);
  ctx.rotate(headTilt * Math.PI / 180);
  
  ctx.fillStyle = c[0];
  ctx.fillRect(-25, -25, 30, 30); // Cabeza principal
  ctx.fillStyle = c[1];
  ctx.fillRect(-25, -10, 15, 15); // Hocico/Pecho

  // Ojos
  ctx.fillStyle = isBlinking ? '#2d3748' : (state.breed === 'husky' ? '#00f2ff' : '#000');
  ctx.fillRect(-18, -15, 5, isBlinking ? 1 : 5);
  
  ctx.restore();

  // OBJETO: COMIDA
  if (state.anim === 'feed') {
    ctx.fillStyle = '#7c2d12';
    ctx.fillRect(-40, 35, 20, 10); // Cuenco
  }

  ctx.restore();
}

function petAction(type) {
  if (state.busy) return;
  
  if (type === 'feed') {
    state.anim = 'feed';
    state.busy = true;
    state.hunger = Math.min(100, state.hunger + 30);
    setTimeout(() => { state.anim = 'idle'; state.busy = false; addXP(10); }, 2000);
  } else if (type === 'play') {
    if (state.energy < 20) return;
    state.anim = 'play';
    state.busy = true;
    state.energy -= 20;
    setTimeout(() => { state.anim = 'idle'; state.busy = false; addXP(20); }, 2000);
  } else if (type === 'sleep') {
    state.busy = true;
    state.anim = 'sleep';
    document.getElementById('sleepOverlay').style.display = 'flex';
    let time = 10;
    const itv = setInterval(() => {
      time--;
      document.getElementById('sleepTimer').innerText = time + 's';
      if (time <= 0) {
        clearInterval(itv);
        state.busy = false; state.anim = 'idle';
        state.energy = 100;
        document.getElementById('sleepOverlay').style.display = 'none';
      }
    }, 1000);
  }
}

function addXP(val) {
  state.xp += val;
  if (state.xp >= 100) { state.lv++; state.xp = 0; }
  updateUI();
}

function updateUI() {
  document.getElementById('xpFill').style.width = state.xp + '%';
  document.getElementById('energyFill').style.width = state.energy + '%';
  document.getElementById('hungerFill').style.width = state.hunger + '%';
  document.getElementById('lvTxt').innerText = 'LV ' + state.lv;
}

// --- MOTOR DE MINIJUEGOS ---
function launchGame(type) {
  if (state.busy || state.energy < 15) return;
  const container = document.getElementById('gameContainer');
  container.innerHTML = '';
  state.busy = true;
  state.energy -= 15;

  let score = 0;

  if (type === 'catch') {
    let timeLeft = 10;
    const itv = setInterval(() => {
      const item = document.createElement('div');
      item.className = 'game-obj';
      item.innerHTML = '🎾';
      item.style.left = Math.random() * 80 + '%';
      item.onclick = () => { score++; item.remove(); };
      container.appendChild(item);
      timeLeft -= 0.5;
      if (timeLeft <= 0) { clearInterval(itv); finishGame(score); }
    }, 500);
  } else if (type === 'click') {
    container.innerHTML = '<button id="clickBtn" style="width:100px; height:100px; border-radius:50%; font-size:40px;">🐾</button>';
    const btn = document.getElementById('clickBtn');
    btn.onclick = () => { score++; btn.style.transform = 'scale(1.1)'; setTimeout(()=>btn.style.transform='scale(1)', 50); };
    setTimeout(() => finishGame(score), 5000);
  } else {
    container.innerHTML = '<p>¡Presiona cuando esté en VERDE!</p><div id="bar" style="width:80%; height:20px; background:#1e293b; position:relative;"><div id="pointer" style="width:10px; height:100%; background:white; position:absolute; left:0;"></div><div style="width:20%; height:100%; background:green; margin:auto;"></div></div>';
    // Lógica simplificada de timing
    setTimeout(() => finishGame(10), 3000);
  }
}

function finishGame(score) {
  const reward = score * 5;
  addXP(reward);
  const container = document.getElementById('gameContainer');
  container.innerHTML = `<h3 style="color:var(--accent)">¡FIN!</h3><p>Ganaste ${reward} XP</p>`;
  setTimeout(() => {
    state.busy = false;
    container.innerHTML = `<p id="mgHint" style="color:var(--muted); text-align:center; padding:20px;">Selecciona un juego:<br><br>
        <button onclick="launchGame('catch')">ATRAPAR</button>
        <button onclick="launchGame('click')">CLICKER</button>
        <button onclick="launchGame('timing')">PRESIÓN</button></p>`;
  }, 2000);
}

function startApp() {
  state.name = document.getElementById('petName').value || 'DOGGO';
  state.breed = document.getElementById('petBreed').value;
  document.getElementById('nameDisplay').innerText = state.name.toUpperCase();
  document.getElementById('modal').style.display = 'none';
  setInterval(() => {
    state.tick++;
    if (state.tick % 20 === 0) state.frame = (state.frame + 1) % 4;
    if (!state.busy) {
        state.hunger = Math.max(0, state.hunger - 0.05);
        state.energy = Math.max(0, state.energy - 0.02);
    }
    drawPet();
    updateUI();
  }, 50);
}
</script>
</body>
</html>
