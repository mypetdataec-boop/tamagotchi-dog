<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>NeoPixel Pet: Pro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --card: #161e31; --accent: #00f2ff; --xp: #8b5cf6;
    --danger: #f43f5e; --success: #10b981; --text: #f1f5f9;
  }
  * { box-sizing: border-box; user-select: none; font-family: 'Inter', sans-serif; }
  body { margin: 0; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  
  #app { width: 1000px; max-width: 95%; display: grid; gap: 20px; grid-template-columns: 450px 1fr; }
  .card { background: var(--card); border: 2px solid #2d3748; border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
  
  canvas { width: 100%; height: 350px; background: #000; border-radius: 12px; image-rendering: pixelated; border: 3px solid #334155; }
  
  /* UI Bars */
  .bar-container { background: #0f172a; height: 12px; border-radius: 6px; margin: 8px 0 15px; border: 1px solid #2d3748; }
  .bar-fill { height: 100%; width: 100%; transition: 0.3s; border-radius: 6px; }
  
  /* Buttons */
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    background: #2d3748; color: white; border: none; padding: 12px; border-radius: 10px;
    font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 12px;
  }
  button:hover:not(:disabled) { background: #4a5568; transform: translateY(-2px); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #000; }
  
  /* Minigame Engine */
  #gameZone {
    height: 250px; background: #0f172a; border-radius: 12px; border: 2px dashed #334155;
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .mg-object { position: absolute; font-size: 30px; cursor: pointer; transition: transform 0.1s; }
  
  /* Overlays */
  #overlay {
    position: absolute; inset: 0; background: rgba(0,0,50,0.9);
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  #modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div id="modal">
  <div class="card" style="width: 380px; text-align: center;">
    <h2 style="font-family:'Press Start 2P'; font-size:12px; color:var(--accent)">NUEVO COMPAÑERO</h2>
    <input id="pName" type="text" placeholder="Nombre..." style="width:100%; padding:12px; margin:15px 0; border-radius:8px; border:none; background:#0f172a; color:white;">
    <select id="pBreed" style="width:100%; padding:12px; border-radius:8px; background:#0f172a; color:white; border:none;">
      <option value="husky">Husky Siberiano</option>
      <option value="yorkie">Yorkie Terrier</option>
      <option value="poodle">Poodle Caniche</option>
      <option value="bulldog">Bulldog Inglés</option>
      <option value="labrador">Labrador Dorado</option>
    </select>
    <br><br>
    <button onclick="startGame()" class="btn-primary" style="width:100%">EMPEZAR</button>
  </div>
</div>

<div id="app">
  <div class="card">
    <div id="overlay">
      <h1 style="font-family:'Press Start 2P';">Zzz...</h1>
      <p id="timer" style="font-weight:900; color:var(--accent)">10s</p>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span id="lvLabel" style="background:var(--xp); padding:4px 8px; border-radius:5px; font-size:10px; font-family:'Press Start 2P'">LV 1</span>
        <span id="nameLabel" style="font-weight:900; color:var(--accent)">DOGGO</span>
    </div>
    <canvas id="petCanvas" width="200" height="200"></canvas>
    
    <p style="font-size:10px; margin:10px 0 5px; font-weight:900;">XP EXPERIENCIA</p>
    <div class="bar-container"><div id="xpBar" class="bar-fill" style="background:var(--xp); width:0%"></div></div>

    <div class="controls">
      <button onclick="action('feed')" class="btn-primary">🍖 COMER</button>
      <button onclick="action('play')" class="btn-primary">🎾 JUGAR</button>
      <button onclick="action('sleep')" style="background:#f59e0b">😴 DORMIR</button>
      <button onclick="action('clean')" style="background:#10b981">🧼 LIMPIAR</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">ESTADO Y JUEGOS</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label style="font-size:10px; font-weight:900;">ENERGÍA</label>
            <div class="bar-container"><div id="energyBar" class="bar-fill" style="background:#38bdf8"></div></div>
        </div>
        <div>
            <label style="font-size:10px; font-weight:900;">HAMBRE</label>
            <div class="bar-container"><div id="hungerBar" class="bar-fill" style="background:#fb7185"></div></div>
        </div>
    </div>

    <div id="gameZone">
      <div id="gameMenu">
        <p style="font-size:12px; text-align:center; color:#94a3b8; margin-bottom:15px;">Gana XP en los minijuegos:</p>
        <button onclick="initGame('catch')">🎾 ATRAPAR</button>
        <button onclick="initGame('clicker')">🦴 HUESO</button>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  name: 'Doggo', breed: 'husky',
  hunger: 100, energy: 100, xp: 0, lv: 1,
  anim: 'idle', tick: 0, frame: 0,
  busy: false
};

const canvas = document.getElementById('petCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// --- DIBUJO PROFESIONAL ---
function draw() {
  ctx.clearRect(0, 0, 200, 200);
  ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 150, 200, 50); // Suelo

  const x = 70, y = 110;
  let bounce = Math.sin(state.tick * 0.15) * 3;
  let headY = 0, mouthOpen = 0, rotation = 0;

  if (state.anim === 'play') {
    bounce = -Math.abs(Math.sin(state.tick * 0.2) * 40);
    rotation = Math.sin(state.tick * 0.2) * 0.1;
  }
  if (state.anim === 'feed') {
    headY = (state.tick % 20 < 10) ? 8 : 2;
    mouthOpen = (state.tick % 20 < 10) ? 5 : 0;
  }

  ctx.save();
  ctx.translate(x + 30, y + 40 + bounce);
  ctx.rotate(rotation);
  ctx.translate(-30, -40);

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(30, 45, 30, 7, 0, 0, Math.PI*2); ctx.fill();

  const colors = {
    husky: ['#64748b', '#f1f5f9', '#00f2ff'],
    yorkie: ['#78350f', '#fbbf24', '#000'],
    poodle: ['#fdf4ff', '#f0abfc', '#000'],
    bulldog: ['#a67c52', '#451a03', '#000'],
    labrador: ['#fbbf24', '#fef08a', '#000']
  }[state.breed];

  // CUERPO (Derecha)
  ctx.fillStyle = colors[0];
  ctx.fillRect(10, 10, 50, 35); // Tronco
  ctx.fillRect(55, 5, 10, 15);  // Cola

  // PATAS
  ctx.fillRect(15, 40, 10, 15); ctx.fillRect(45, 40, 10, 15);

  // CABEZA (Izquierda - Frente al cuenco)
  ctx.save();
  ctx.translate(15, 15 + headY);
  ctx.fillStyle = colors[0];
  ctx.fillRect(-30, -30, 35, 35); // Cráneo
  ctx.fillStyle = colors[1];
  ctx.fillRect(-35, -10, 20, 15); // Hocico

  // Ojos
  ctx.fillStyle = (state.anim === 'sleep') ? '#2d3748' : colors[2];
  const eyeH = (state.anim === 'sleep' || state.frame === 1) ? 2 : 7;
  ctx.fillRect(-22, -20, 6, eyeH);

  // Boca (cuando come)
  if (mouthOpen > 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(-35, 0, 15, mouthOpen);
  }
  ctx.restore();

  // CUENCO DE COMIDA
  if (state.anim === 'feed') {
    ctx.fillStyle = '#7c2d12';
    ctx.fillRect(-30, 40, 25, 12);
    ctx.fillStyle = '#fbbf24'; ctx.fillRect(-25, 38, 5, 5); // Croqueta
  }

  ctx.restore();
}

// --- ACCIONES ---
function action(type) {
  if (state.busy) return;

  if (type === 'feed') {
    state.busy = true; state.anim = 'feed';
    state.hunger = Math.min(100, state.hunger + 30);
    setTimeout(() => { state.busy = false; state.anim = 'idle'; addXP(15); }, 2500);
  } else if (type === 'play') {
    if (state.energy < 20) return alert("¡Está muy cansado!");
    state.busy = true; state.anim = 'play';
    state.energy -= 20;
    setTimeout(() => { state.busy = false; state.anim = 'idle'; addXP(20); }, 2000);
  } else if (type === 'sleep') {
    state.busy = true; state.anim = 'sleep';
    document.getElementById('overlay').style.display = 'flex';
    let count = 10;
    const itv = setInterval(() => {
      count--;
      document.getElementById('timer').innerText = count + 's';
      if (count <= 0) {
        clearInterval(itv);
        state.busy = false; state.anim = 'idle';
        state.energy = 100;
        document.getElementById('overlay').style.display = 'none';
      }
    }, 1000);
  } else if (type === 'clean') {
      addXP(5);
      // Animación rápida de limpieza
  }
}

// --- MINIJUEGOS REALES ---
function initGame(game) {
  if (state.busy || state.energy < 15) return;
  state.busy = true;
  state.energy -= 15;
  const zone = document.getElementById('gameZone');
  zone.innerHTML = '';
  
  let score = 0;
  
  if (game === 'catch') {
    let timeLeft = 10;
    const gameItv = setInterval(() => {
      const ball = document.createElement('div');
      ball.className = 'mg-object';
      ball.innerHTML = '🎾';
      ball.style.left = Math.random() * 85 + '%';
      ball.style.top = '-40px';
      zone.appendChild(ball);
      
      // Animación de caída
      let pos = -40;
      const fallItv = setInterval(() => {
        pos += 4;
        ball.style.top = pos + 'px';
        if (pos > 250) { clearInterval(fallItv); ball.remove(); }
      }, 20);

      ball.onclick = () => { score++; ball.remove(); clearInterval(fallItv); };
      
      timeLeft -= 0.6;
      if (timeLeft <= 0) { clearInterval(gameItv); endMinigame(score * 10); }
    }, 600);
  } 
  else if (game === 'clicker') {
    zone.innerHTML = '<h2 id="cCount" style="font-size:40px">0</h2><button id="targetBtn" style="width:80px; height:80px; border-radius:50%; font-size:30px">🦴</button>';
    const btn = document.getElementById('targetBtn');
    btn.onclick = () => { score++; document.getElementById('cCount').innerText = score; };
    setTimeout(() => endMinigame(score * 3), 5000);
  }
}

function endMinigame(reward) {
  const zone = document.getElementById('gameZone');
  zone.innerHTML = `<h3>¡TIEMPO!</h3><p>Ganaste +${reward} XP</p>`;
  addXP(reward);
  setTimeout(() => {
    state.busy = false;
    zone.innerHTML = `<div id="gameMenu">
        <button onclick="initGame('catch')">🎾 ATRAPAR</button>
        <button onclick="initGame('clicker')">🦴 HUESO</button>
    </div>`;
  }, 2000);
}

// --- ENGINE ---
function addXP(v) {
  state.xp += v;
  if (state.xp >= 100) { state.lv++; state.xp = 0; }
  updateUI();
}

function updateUI() {
  document.getElementById('xpBar').style.width = state.xp + '%';
  document.getElementById('energyBar').style.width = state.energy + '%';
  document.getElementById('hungerBar').style.width = state.hunger + '%';
  document.getElementById('lvLabel').innerText = 'LV ' + state.lv;
}

function startGame() {
  state.name = document.getElementById('pName').value || 'DOGGO';
  state.breed = document.getElementById('pBreed').value;
  document.getElementById('nameLabel').innerText = state.name.toUpperCase();
  document.getElementById('modal').style.display = 'none';
  
  setInterval(() => {
    state.tick++;
    if (state.tick % 25 === 0) state.frame = (state.frame + 1) % 2;
    if (!state.busy) {
        state.hunger = Math.max(0, state.hunger - 0.05);
        state.energy = Math.max(0, state.energy - 0.02);
    }
    draw();
    updateUI();
  }, 40);
}
</script>
</body>
</html>
